<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive 2026年6月 | Slide Archive</title>
  <script>
    (function() {
      var theme = "light";
      try {
        theme = localStorage.getItem("slide-archive-theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      } catch (error) {
        theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../../../assets/css/common.css">
</head>
<body>
  <!-- このファイルは tools/generate_indexes.py が自動生成しています。手動編集せず、フォルダ構成を変更してからスクリプトを実行してください。 -->

  <script>
    (function() {
      var root = document.documentElement;
      var button = document.querySelector("[data-theme-toggle]");
      var label = document.querySelector("[data-theme-label]");
      var media = window.matchMedia("(prefers-color-scheme: dark)");

      function storedTheme() {
        try {
          return localStorage.getItem("slide-archive-theme");
        } catch (error) {
          return null;
        }
      }

      function setStoredTheme(theme) {
        try {
          localStorage.setItem("slide-archive-theme", theme);
        } catch (error) {
          return;
        }
      }

      function applyTheme(theme) {
        root.dataset.theme = theme;
        if (button) {
          button.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
        }
        if (label) {
          label.textContent = theme === "dark" ? "Dark" : "Light";
        }
      }

      applyTheme(root.dataset.theme === "dark" ? "dark" : "light");

      if (button) {
        button.addEventListener("click", function() {
          var next = root.dataset.theme === "dark" ? "light" : "dark";
          applyTheme(next);
          setStoredTheme(next);
        });
      }

      media.addEventListener("change", function(event) {
        if (!storedTheme()) {
          applyTheme(event.matches ? "dark" : "light");
        }
      });
    })();
  </script>
